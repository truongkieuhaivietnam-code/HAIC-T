<style>
:root{
  --bg:#f4f6f8; --card:#ffffff; --text:#1c2530; --muted:#677483; --border:#e1e6eb;

  --warn:#b8860b; --header-bg:#0d47a1; --header-text:#ffffff; --input-bg:#ffffff;
  --table-head:#eef3fa; --shadow:0 1px 3px rgba(0,0,0,.08);
}
body.dark{
  --bg:#10151b; --card:#1a212b; --text:#e7ecf1; --muted:#9aa7b4; --border:#2b3543;
  --primary:#4a90e2; --primary-dark:#3a76c2; --accent:#43a047; --danger:#e57373;
  --warn:#d7a23a; --header-bg:#0b1118; --header-text:#e7ecf1; --input-bg:#222b36;
  --table-head:#202a36; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
header.topbar{position:sticky;top:0;z-index:50;background:var(--header-bg);color:var(--header-text);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;box-shadow:var(--shadow)}
header.topbar .title{font-weight:700;font-size:15px}
header.topbar .title small{display:block;font-weight:400;font-size:11px;opacity:.8}
.topbar-actions{display:flex;align-items:center;gap:8px}
.iconbtn{background:rgba(255,255,255,.15);border:none;color:inherit;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
.iconbtn:hover{background:rgba(255,255,255,.28)}
nav.tabs{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:40}
nav.tabs button{flex:0 0 auto;padding:10px 14px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
main{padding:12px;max-width:980px;margin:0 auto;padding-bottom:60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h2,.card h3{margin-top:0}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{flex:1;min-width:140px;margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-size:14px}
textarea{resize:vertical;min-height:50px}
button.btn{background:var(--primary);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
button.btn.secondary{background:var(--border);color:var(--text)}
button.btn.danger{background:var(--danger);color:#fff}
button.btn.small{padding:6px 10px;font-size:12px}
button.btn:disabled{opacity:.5}
table.grid{width:100%;border-collapse:collapse;font-size:12px}
table.grid th,table.grid td{border:1px solid var(--border);padding:5px;text-align:center}
table.grid th{background:var(--table-head);font-size:11px}
table.grid input{padding:4px;font-size:12px;text-align:center}
table.grid td.txt input{text-align:left}
.tablewrap{overflow-x:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge.VN{background:#fdecea;color:#c62828}
.badge.LA{background:#fff3e0;color:#b8860b}
.badge.KH{background:#e3f2fd;color:#1565c0}
body.dark .badge.VN{background:#3a2020;color:#ef9a9a}
body.dark .badge.LA{background:#3a3020;color:#e0c285}
body.dark .badge.KH{background:#1c2c3a;color:#90caf9}

.listrow:last-child{border-bottom:none}
.listrow .meta{font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.hidden{display:none!important}
.center{text-align:center}
.login-wrap{max-width:380px;margin:60px auto;padding:0 16px}
.login-wrap .logo{text-align:center;margin-bottom:18px;font-size:20px;font-weight:800;color:var(--primary)}
.muted{color:var(--muted);font-size:12px}
select.role-select{font-weight:600}
.signrow{display:flex;justify-content:space-between;text-align:center;margin-top:18px}
.signrow div{flex:1}
.signrow .line{margin-top:50px;border-top:1px solid var(--text);padding-top:4px;font-size:12px}
.totalrow{font-weight:700;background:var(--table-head)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:12px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.lang-toggle button{border:none;background:none;color:inherit;padding:6px 9px;font-size:12px;font-weight:700;cursor:pointer}
.lang-toggle button.active{background:rgba(255,255,255,.3)}
.section-title{font-size:13px;font-weight:700;color:var(--primary);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.4px}

// ---------- State ----------
let CURRENT_USER = null; // {email, role, country, displayName}

let PROJECTS_CACHE = [];
let USERS_CACHE = [];

async function loadUsersCache(){
  try{
    const snap = await db.collection('users').get({ source: 'server' });
    USERS_CACHE = snap.docs
      .map(d=>({email:d.id,...d.data()}))
      .filter(u=>u.active!==false && u.email);
    console.log('[HAIC] Users loaded:', USERS_CACHE.length, USERS_CACHE.map(u=>u.email));
  }catch(e){
    console.warn('[HAIC] loadUsersCache error:', e.code, e.message);
    USERS_CACHE = [];
    if(e.code==='permission-denied'){
      toast('Firestore rules chưa được publish — danh sách nhân viên không load được.');
    }
  }
}

async function reloadAndPopulatePicker(selectId, nameId, emailId, countryFilter){
  const sel = document.getElementById(selectId);
  if(!sel) return;
  sel.innerHTML = '<option>Đang tải... / Loading...</option>';
  await loadUsersCache();
  sel.innerHTML = buildUserOpts(countryFilter, document.getElementById(emailId)?.value||'');
}

function buildUserOpts(countryFilter, selectedEmail){
  const list = countryFilter
    ? USERS_CACHE.filter(u=>u.country===countryFilter)
    : USERS_CACHE;
  const notInList = selectedEmail && !list.find(u=>u.email===selectedEmail);
  const label0 = LANG==='vi' ? '-- Chọn từ danh sách --' : '-- Select from list --';
  const labelM = LANG==='vi' ? '✏ Nhập tay' : '✏ Manual entry';
  const opts = list.map(u=>{
    const name = u.displayName||u.email;
    const sel = u.email===selectedEmail ? 'selected' : '';
    return `<option value="${u.email}" ${sel}>${name} (${u.country})</option>`;
  }).join('');
  return `<option value="">${label0}</option>${opts}<option value="__manual__" ${notInList?'selected':''}>${labelM}</option>`;
}

function onPickUser(nameId, emailId, selectId){
  const sel = document.getElementById(selectId);
  if(!sel) return;
  const val = sel.value;
  const nameEl = document.getElementById(nameId);
  const emailEl = document.getElementById(emailId);
  if(val==='' || val==='__manual__'){
    if(nameEl) nameEl.value='';
    if(emailEl) emailEl.value='';
    if(nameEl) nameEl.removeAttribute('readonly');
    if(emailEl) emailEl.removeAttribute('readonly');
  } else {
    const u = USERS_CACHE.find(u=>u.email===val);
    if(u){
      if(nameEl){ nameEl.value=u.displayName||u.email; nameEl.setAttribute('readonly',''); }
      if(emailEl){ emailEl.value=u.email; emailEl.setAttribute('readonly',''); }
    }
  }
}

// ---------- Auth ----------
function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';
  if(!email || !pass){ document.getElementById('login-error').textContent = t('invalidLogin'); return; }
  auth.signInWithEmailAndPassword(email, pass).catch(err=>{
    document.getElementById('login-error').textContent = t('invalidLogin') + ' (' + err.code + ')';
  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(async (user)=>{
  try{
    if(!user){
      CURRENT_USER = null;
      document.getElementById('view-app').classList.add('hidden');
      document.getElementById('view-login').classList.remove('hidden');
      applyI18n();
      return;
    }
    const email = user.email.toLowerCase();
    const userRef = db.collection('users').doc(email);
    let snap = await userRef.get();
    if(!snap.exists){
      if(email === SUPER_ADMIN_EMAIL){
        await userRef.set({ email, role:'superadmin', country:'KH', displayName:'Super Admin', active:true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        snap = await userRef.get();
      } else {
        toast(t('permissionDenied'));
        await auth.signOut();
        return;
      }
    }
    const data = snap.data();
    if(data.active === false){ toast(t('permissionDenied')); await auth.signOut(); return; }
    CURRENT_USER = { email, role:data.role, country:data.country, displayName:data.displayName || email };
    document.getElementById('view-login').classList.add('hidden');
    document.getElementById('view-app').classList.remove('hidden');
    document.getElementById('user-meta').textContent = `${CURRENT_USER.displayName} · ${CURRENT_USER.role} · ${CURRENT_USER.country}`;
    document.getElementById('tab-admin-btn').classList.toggle('hidden', CURRENT_USER.role==='user');
    await loadCompanyNames();
    await loadProjects();
    applyI18n();
  }catch(err){
    console.error('Auth/load error:', err);
    document.getElementById('view-app').classList.add('hidden');
    document.getElementById('view-login').classList.remove('hidden');
    document.getElementById('login-error').textContent = 'Lỗi / Error: ' + err.message;
    applyI18n();
  }
});

async function loadCompanyNames(){
  const docRef = db.collection('settings').doc('companyNames');
  const snap = await docRef.get();
  if(snap.exists){ COMPANY_NAMES = snap.data(); }
  else {
    COMPANY_NAMES = { VN: COUNTRIES.VN.defaultPartyB, LA: COUNTRIES.LA.defaultPartyB, KH: COUNTRIES.KH.defaultPartyB };
    if(CURRENT_USER && CURRENT_USER.role==='superadmin') docRef.set(COMPANY_NAMES);
  }
}

async function loadProjects(){
  let q = db.collection('projects');
  if(CURRENT_USER.role !== 'superadmin') q = q.where('country','==',CURRENT_USER.country);
  const snap = await q.get();

}

// ---------- Tabs ----------
document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-tab]');
  if(!btn) return;
  if(btn.classList.contains('hidden')) return;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ACTIVE_TAB = btn.dataset.tab;
  document.querySelectorAll('main > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById('tab-'+ACTIVE_TAB).classList.remove('hidden');
  renderActiveTab();
});
function renderActiveTab(){
  if(!CURRENT_USER) return;
  if(ACTIVE_TAB==='dashboard') renderDashboard();
  if(ACTIVE_TAB==='projects') renderProjects();
  if(ACTIVE_TAB==='forms') renderForms();
  if(ACTIVE_TAB==='goods') renderGoods();
  if(ACTIVE_TAB==='admin') renderAdmin();
}

function renderRows(disabled){
  const tbody = document.getElementById('rows-tbody');
  const rows = window._editingForm.rows;
  const d = disabled ? 'disabled' : '';
  tbody.innerHTML = rows.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="txt"><input value="${r.borehole}" ${d} onchange="updateRow(${i},'borehole',this.value)"></td>
      <td><input value="${r.depth}" ${d} onchange="updateRow(${i},'depth',this.value)" style="width:55px"></td>
      <td><input type="number" min="0" value="${r.soil}" ${d} onchange="updateRow(${i},'soil',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.rock}" ${d} onchange="updateRow(${i},'rock',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.spt}" ${d} onchange="updateRow(${i},'spt',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.water}" ${d} onchange="updateRow(${i},'water',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.stainless}" ${d} onchange="updateRow(${i},'stainless',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.pvc}" ${d} onchange="updateRow(${i},'pvc',this.value)" style="width:45px"></td>
      <td class="txt"><input value="${r.remarks}" ${d} onchange="updateRow(${i},'remarks',this.value)"></td>
      ${!disabled ? `<td><button class="btn small secondary" onclick="removeRow(${i})">✕</button></td>` : ''}
    </tr>`).join('') + totalsRowHtml(rows);
}
function totalsRowHtml(rows){
  const sum = k => rows.reduce((a,r)=>a + (parseFloat(r[k])||0), 0);
  return `<tr class="totalrow"><td colspan="3">${t('total')}</td>
    <td>${sum('soil')}</td><td>${sum('rock')}</td><td>${sum('spt')}</td><td>${sum('water')}</td>
    <td>${sum('stainless')}</td><td>${sum('pvc')}</td><td colspan="2"></td></tr>`;

async function getNextDocNo(country){
  const counterRef = db.collection('counters').doc(country);
  return db.runTransaction(async (tx)=>{
    const snap = await tx.get(counterRef);
    const last = snap.exists ? (snap.data().lastNumber||0) : 0;
    const next = last + 1;
    tx.set(counterRef, {lastNumber: next}, {merge:true});
    return `${country}-${String(next).padStart(4,'0')}`;
  });
}

async function loadGoodsList(){
  const listEl = document.getElementById('goods-list');
  if(!listEl) return;
  try{
    let list = [];
    if(GOODS_VIEW==='sent'){
      const snap = await db.collection('goods_handovers').where('createdBy','==',CURRENT_USER.email).orderBy('createdAt','desc').get();
      list = snap.docs.map(d=>({id:d.id,...d.data()}));
    } else if(GOODS_VIEW==='inbox'){
      const snap = await db.collection('goods_handovers').where('receiverEmail','==',CURRENT_USER.email).orderBy('createdAt','desc').get();
      list = snap.docs.map(d=>({id:d.id,...d.data()}));
    } else {
      // 2 queries riêng (sender + receiver) rồi merge để tránh permissions error
      const country = CURRENT_USER.country;
      const filter = document.getElementById('goods-filter');
      const filterVal = filter ? filter.value : 'ALL';
      let snaps;
      if(CURRENT_USER.role==='superadmin'){
        const q = filterVal!=='ALL'
          ? db.collection('goods_handovers').where('senderCountry','==',filterVal).orderBy('createdAt','desc')
          : db.collection('goods_handovers').orderBy('createdAt','desc');
        snaps = [await q.get()];
      } else {
        const [s1, s2] = await Promise.all([
          db.collection('goods_handovers').where('senderCountry','==',country).orderBy('createdAt','desc').get(),
          db.collection('goods_handovers').where('receiverCountry','==',country).orderBy('createdAt','desc').get()
        ]);
        const seen = new Set();
        list = [...s1.docs,...s2.docs].filter(d=>{ if(seen.has(d.id)) return false; seen.add(d.id); return true; })
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
        snaps = null;
      }
      if(snaps) list = snaps.flatMap(s=>s.docs.map(d=>({id:d.id,...d.data()})));
    }
    if(!list.length){ listEl.innerHTML=`<p class="muted">${t('noGoods')}</p>`; return; }
    listEl.innerHTML = list.map(g=>`
      <div class="listrow" onclick="openGoodsEditor('${g.id}')">
        <div>
          <div><strong>${g.docNo||'...'}</strong>
            <span class="badge ${g.senderCountry}">${g.senderCountry}</span>
            <span style="font-size:11px;color:var(--muted)">→</span>
            <span class="badge ${g.receiverCountry}">${g.receiverCountry}</span>
          </div>
          <div class="meta">${g.senderName||''} → ${g.receiverName||''} · ${g.sendDate||''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:700;color:${gStatusColor(g.status)}">${gStatus(g.status)}</div>
          ${g.status!=='delivered' && g.receiverEmail===CURRENT_USER.email
            ? `<button class="btn small" style="margin-top:4px;background:var(--accent)" onclick="event.stopPropagation();openConfirmReceive('${g.id}')">${t('confirmReceive')}</button>` : ''}
        </div>
      </div>`).join('');
  }catch(err){
    listEl.innerHTML=`<p class="muted">${err.message}</p>`;
  }
}

            ${g.receiverEmail && USERS_CACHE.find(u=>u.email===g.receiverEmail) ? 'readonly' : ''}></div>
        <div class="field"><label>${t('receiverPhone')}</label>
          <input id="g-rphone" value="${g.receiverPhone||''}" ${dis}></div>
        <div class="field"><label>${t('receiverAccount')}</label>
          <input id="g-remail" type="email" value="${g.receiverEmail||''}" placeholder="email@haic.com" ${dis}
            ${g.receiverEmail && USERS_CACHE.find(u=>u.email===g.receiverEmail) ? 'readonly' : ''}></div>
      </div>

      <div class="section-title">${t('carrier')}</div>
      <div class="row">
        <div class="field"><label>${t('carrierName')}</label><input id="g-cname" value="${g.carrierName||''}" ${dis}></div>
        <div class="field"><label>${t('carrierPhone')}</label><input id="g-cphone" value="${g.carrierPhone||''}" ${dis}></div>
        <div class="field"><label>${t('trackingNo')}</label><input id="g-track" value="${g.trackingNo||''}" ${dis}></div>
      </div>
      <div class="row">
        <div class="field"><label>${t('sendDate')}</label><input id="g-sdate" type="date" value="${g.sendDate||''}" ${dis}></div>
        <div class="field"><label>${t('estimatedArrival')}</label><input id="g-eta" type="date" value="${g.estimatedArrival||''}" ${dis}></div>
      </div>

      <div class="section-title">${t('tabGoods')}</div>
      <div class="tablewrap">
        <table class="grid" id="goods-rows-table">
          <thead><tr>
            <th>${t('no')}</th>
            <th style="min-width:160px">${t('itemName')}</th>
            <th style="min-width:60px">${t('qty')}</th>
            <th style="min-width:70px">${t('unit')}</th>
            <th style="min-width:100px">${t('condition')}</th>
            <th style="min-width:120px">${t('remarks')}</th>
            ${!isDelivered?'<th></th>':''}
          </tr></thead>
          <tbody id="goods-rows-tbody"></tbody>
        </table>
      </div>
      ${!isDelivered ? `<button class="btn small secondary" style="margin-top:8px" onclick="addGoodsRow()">${t('addRow')}</button>` : ''}

      <div class="section-title">${t('comment')}</div>
      <textarea id="g-comment" ${dis}>${g.comment||''}</textarea>

      ${!isDelivered ? `
      <div class="row" style="margin-top:14px;flex-wrap:wrap">
        ${canEdit ? `
        <button class="btn" onclick="saveGoodsForm('pending')">${t('save')} (${t('statusPending')})</button>
        <button class="btn" style="background:var(--warn)" onclick="saveGoodsForm('transit')">${t('markTransit')}</button>` : ''}

          ? `<button class="btn" style="background:var(--accent)" onclick="openConfirmReceive('${g.id}')">${t('confirmReceive')}</button>` : ''}

        <button class="btn secondary" onclick="exportGoodsPdf()">${t('exportPdf')}</button>
        <button class="btn secondary" onclick="exportGoodsExcel()">${t('exportExcel')}</button>
        ${CURRENT_USER.role!=='user' ? `<button class="btn danger" onclick="deleteGoodsForm()">${t('delete')}</button>` : ''}` : ''}
      </div>` : `
      <div class="row" style="margin-top:14px">
        <button class="btn secondary" onclick="exportGoodsPdf()">${t('exportPdf')}</button>
        <button class="btn secondary" onclick="exportGoodsExcel()">${t('exportExcel')}</button>
      </div>`}
    </div>`;
  renderGoodsRows();
  // Populate receiver dropdown sau khi HTML đã render xong
  const gpick = document.getElementById('g-receiver-pick');
  if(gpick){
    if(USERS_CACHE.length){
      gpick.innerHTML = buildUserOpts(g.receiverCountry, g.receiverEmail);
    } else {
      // Thử load lại nếu cache rỗng
      loadUsersCache().then(()=>{
        if(gpick) gpick.innerHTML = buildUserOpts(g.receiverCountry, g.receiverEmail||'');
      });
    }
  }
}

function renderGoodsRows(){
  const g = window._editingGoods;
  const isDelivered = g.status==='delivered';
  const tbody = document.getElementById('goods-rows-tbody');
  if(!tbody) return;
  tbody.innerHTML = g.items.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="txt"><input value="${r.name}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'name',this.value)"></td>
      <td><input type="number" min="0" value="${r.qty}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'qty',this.value)" style="width:55px"></td>
      <td class="txt"><input value="${r.unit}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'unit',this.value)" style="width:60px"></td>
      <td class="txt"><input value="${r.condition}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'condition',this.value)"></td>
      <td class="txt"><input value="${r.remarks}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'remarks',this.value)"></td>
      ${!isDelivered ? `<td><button class="btn small secondary" onclick="removeGoodsRow(${i})">✕</button></td>` : ''}
    </tr>`).join('');
}
function updateGoodsRow(i,f,v){ window._editingGoods.items[i][f]=v; }
function addGoodsRow(){ window._editingGoods.items.push(blankGoodsRow()); renderGoodsRows(); }
function removeGoodsRow(i){ window._editingGoods.items.splice(i,1); renderGoodsRows(); }

function collectGoodsFields(){
  const g = window._editingGoods;
  g.senderName = document.getElementById('g-sname').value.trim();
  g.senderPhone = document.getElementById('g-sphone').value.trim();
  g.receiverCountry = document.getElementById('g-rcountry').value;
  g.receiverName = document.getElementById('g-rname').value.trim();
  g.receiverPhone = document.getElementById('g-rphone').value.trim();
  g.receiverEmail = document.getElementById('g-remail').value.trim().toLowerCase();
  g.carrierName = document.getElementById('g-cname').value.trim();
  g.carrierPhone = document.getElementById('g-cphone').value.trim();
  g.trackingNo = document.getElementById('g-track').value.trim();
  g.sendDate = document.getElementById('g-sdate').value;
  g.estimatedArrival = document.getElementById('g-eta').value;
  g.comment = document.getElementById('g-comment').value;
}

async function getNextGoodsDocNo(country){
  const counterRef = db.collection('counters').doc(country+'-HH');
  return db.runTransaction(async(tx)=>{
    const snap = await tx.get(counterRef);
    const last = snap.exists ? (snap.data().lastNumber||0) : 0;
    const next = last+1;
    tx.set(counterRef,{lastNumber:next},{merge:true});
    return `${country}-HH-${String(next).padStart(4,'0')}`;
  });
}

async function saveGoodsForm(status){
  collectGoodsFields();
  const g = window._editingGoods;
  if(!g.receiverEmail){ toast(t('receiverAccount')+' ?'); return; }
  if(!g.receiverCountry){ toast(t('receiverCountry')+' ?'); return; }
  g.status = status;
  const payload = {
    senderCountry:g.senderCountry, senderName:g.senderName,
    senderEmail:g.senderEmail||CURRENT_USER.email, senderPhone:g.senderPhone,
    receiverCountry:g.receiverCountry, receiverName:g.receiverName,
    receiverEmail:g.receiverEmail, receiverPhone:g.receiverPhone,
    carrierName:g.carrierName, carrierPhone:g.carrierPhone, trackingNo:g.trackingNo,
    sendDate:g.sendDate, estimatedArrival:g.estimatedArrival,
    items:g.items, comment:g.comment, status:g.status,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(), updatedBy:CURRENT_USER.email
  };
  if(g.id){
    await db.collection('goods_handovers').doc(g.id).update(payload);
    toast(t('formSaved'));
  } else {
    const docNo = await getNextGoodsDocNo(g.senderCountry);
    payload.docNo = docNo;
    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    payload.createdBy = CURRENT_USER.email;
    const ref = await db.collection('goods_handovers').add(payload);
    g.id = ref.id; g.docNo = docNo;
    toast(t('formSaved')+': '+docNo);
  }
  renderGoodsEditorView();
}

async function deleteGoodsForm(){
  if(!confirm(t('confirmDelete'))) return;
  await db.collection('goods_handovers').doc(window._editingGoods.id).delete();
  renderGoods();
}

function openConfirmReceive(formId){
  openModal(`
    <h3>${t('confirmReceiveTitle')}</h3>
    <div class="field"><label>${t('actualReceiveDate')}</label><input id="cr-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>${t('confirmNote')}</label><textarea id="cr-note" style="min-height:70px"></textarea></div>
    <div class="row">
      <button class="btn" style="background:var(--accent)" onclick="submitConfirmReceive('${formId}')">${t('confirmReceive')}</button>
      <button class="btn secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>`);
}
async function submitConfirmReceive(formId){
  const date = document.getElementById('cr-date').value;
  const note = document.getElementById('cr-note').value;
  await db.collection('goods_handovers').doc(formId).update({
    status:'delivered',
    actualReceiveDate:date,
    confirmNote:note,
    confirmedBy:CURRENT_USER.displayName,
    confirmedByEmail:CURRENT_USER.email,
    confirmedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  closeModal();
  toast('✓ '+t('statusDelivered'));
  // Refresh
  if(window._editingGoods && window._editingGoods.id===formId){
    openGoodsEditor(formId);
  } else {
    renderGoods();
  }
}

function exportGoodsPdf(){
  const g = window._editingGoods;
  const doc = new jspdf.jsPDF();
  setupPdfFont(doc);
  doc.setFontSize(13); doc.setFont('Roboto','bold');
  doc.text(t('goodsFormTitle'), 105, 14, {align:'center'});
  doc.setFontSize(9); doc.setFont('Roboto','normal');
  let y=22;
  doc.text(`${t('goodsDocNo')}: ${g.docNo||''}`, 14, y); y+=6;
  doc.text(`${t('sender')}: ${g.senderName||''} (${g.senderCountry}) · ${g.senderPhone||''}`, 14, y); y+=6;
  doc.text(`${t('receiver')}: ${g.receiverName||''} (${g.receiverCountry}) · ${g.receiverPhone||''}`, 14, y); y+=6;
  doc.text(`${t('carrier')}: ${g.carrierName||''} · ${g.carrierPhone||''} · Tracking: ${g.trackingNo||''}`, 14, y); y+=6;
  doc.text(`${t('sendDate')}: ${g.sendDate||''} · ${t('estimatedArrival')}: ${g.estimatedArrival||''}`, 14, y); y+=8;
  doc.autoTable({
    startY:y,
    head:[[t('no'),t('itemName'),t('qty'),t('unit'),t('condition'),t('remarks')]],
    body:g.items.map((r,i)=>[i+1,r.name||'',r.qty||'',r.unit||'',r.condition||'',r.remarks||'']),
    styles:{font:'Roboto', fontSize:8},
    headStyles:{font:'Roboto', fontStyle:'bold', fillColor:[21,101,192]}
  });
  y = doc.lastAutoTable.finalY + 8;
  doc.text(`${t('comment')}: ${g.comment||''}`, 14, y); y+=10;
  if(g.status==='delivered'){
    doc.setFont('Roboto','bold');
    doc.text(`✓ ${t('statusDelivered')}: ${g.confirmedBy||''} · ${g.actualReceiveDate||''}`, 14, y); y+=6;
    doc.setFont('Roboto','normal');
    if(g.confirmNote){ doc.text(`${t('confirmNote')}: ${g.confirmNote}`, 14, y); y+=8; }
  }
  y += 4;
  doc.text(t('sender'), 50, y+30, {align:'center'});
  doc.text(t('receiver'), 160, y+30, {align:'center'});
  doc.save(`${g.docNo||'goods'}.pdf`);
}

function exportGoodsExcel(){
  const g = window._editingGoods;
  const sheetData = [
    [t('goodsFormTitle')],
    [t('goodsDocNo'), g.docNo||''],
    [t('sender'), g.senderName||'', g.senderCountry, g.senderPhone||''],
    [t('receiver'), g.receiverName||'', g.receiverCountry, g.receiverPhone||''],
    [t('carrier'), g.carrierName||'', g.carrierPhone||'', g.trackingNo||''],
    [t('sendDate'), g.sendDate||'', t('estimatedArrival'), g.estimatedArrival||''],
    [],
    [t('no'),t('itemName'),t('qty'),t('unit'),t('condition'),t('remarks')],
    ...g.items.map((r,i)=>[i+1,r.name,r.qty,r.unit,r.condition,r.remarks]),
    [],
    [t('comment'), g.comment||''],
    ...(g.status==='delivered'?[[t('statusDelivered'), g.confirmedBy||'', g.actualReceiveDate||'', g.confirmNote||'']]:[])
  ];
  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Goods');
  XLSX.writeFile(wb, `${g.docNo||'goods'}.xlsx`);
}
