<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>HAIC Sample Handover</title>
<link rel="manifest" href="data:application/json,{}">
<style>
:root{
  --bg:#f4f6f8; --card:#ffffff; --text:#1c2530; --muted:#677483; --border:#e1e6eb;
  --primary:#1565c0; --primary-dark:#0d47a1; --accent:#2e7d32; --danger:#c62828;
  --warn:#b8860b; --header-bg:#0d47a1; --header-text:#ffffff; --input-bg:#ffffff;
  --table-head:#eef3fa; --shadow:0 1px 3px rgba(0,0,0,.08);
}
body.dark{
  --bg:#10151b; --card:#1a212b; --text:#e7ecf1; --muted:#9aa7b4; --border:#2b3543;
  --primary:#4a90e2; --primary-dark:#3a76c2; --accent:#43a047; --danger:#e57373;
  --warn:#d7a23a; --header-bg:#0b1118; --header-text:#e7ecf1; --input-bg:#222b36;
  --table-head:#202a36; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
header.topbar{position:sticky;top:0;z-index:50;background:var(--header-bg);color:var(--header-text);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;box-shadow:var(--shadow)}
header.topbar .title{font-weight:700;font-size:15px}
header.topbar .title small{display:block;font-weight:400;font-size:11px;opacity:.8}
.topbar-actions{display:flex;align-items:center;gap:8px}
.iconbtn{background:rgba(255,255,255,.15);border:none;color:inherit;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
.iconbtn:hover{background:rgba(255,255,255,.28)}
nav.tabs{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:40}
nav.tabs button{flex:0 0 auto;padding:10px 14px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
main{padding:12px;max-width:980px;margin:0 auto;padding-bottom:60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h2,.card h3{margin-top:0}
.row{display:flex;gap:10px;flex-wrap:wrap}
.field{flex:1;min-width:140px;margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-size:14px}
textarea{resize:vertical;min-height:50px}
button.btn{background:var(--primary);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
button.btn.secondary{background:var(--border);color:var(--text)}
button.btn.danger{background:var(--danger);color:#fff}
button.btn.small{padding:6px 10px;font-size:12px}
button.btn:disabled{opacity:.5}
table.grid{width:100%;border-collapse:collapse;font-size:12px}
table.grid th,table.grid td{border:1px solid var(--border);padding:5px;text-align:center}
table.grid th{background:var(--table-head);font-size:11px}
table.grid input{padding:4px;font-size:12px;text-align:center}
table.grid td.txt input{text-align:left}
.tablewrap{overflow-x:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge.VN{background:#fdecea;color:#c62828}
.badge.LA{background:#fff3e0;color:#b8860b}
.badge.KH{background:#e3f2fd;color:#1565c0}
body.dark .badge.VN{background:#3a2020;color:#ef9a9a}
body.dark .badge.LA{background:#3a3020;color:#e0c285}
body.dark .badge.KH{background:#1c2c3a;color:#90caf9}
.listrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.listrow:last-child{border-bottom:none}
.listrow .meta{font-size:12px;color:var(--muted)}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.hidden{display:none!important}
.center{text-align:center}
.login-wrap{max-width:380px;margin:60px auto;padding:0 16px}
.login-wrap .logo{text-align:center;margin-bottom:18px;font-size:20px;font-weight:800;color:var(--primary)}
.muted{color:var(--muted);font-size:12px}
select.role-select{font-weight:600}
.signrow{display:flex;justify-content:space-between;text-align:center;margin-top:18px}
.signrow div{flex:1}
.signrow .line{margin-top:50px;border-top:1px solid var(--text);padding-top:4px;font-size:12px}
.totalrow{font-weight:700;background:var(--table-head)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:12px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.lang-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.lang-toggle button{border:none;background:none;color:inherit;padding:6px 9px;font-size:12px;font-weight:700;cursor:pointer}
.lang-toggle button.active{background:rgba(255,255,255,.3)}
.section-title{font-size:13px;font-weight:700;color:var(--primary);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="view-login" class="login-wrap hidden">
  <div class="logo">HAIC &middot; Sample Handover</div>
  <div class="card">
    <div class="field"><label data-i18n="email">Email</label><input id="login-email" type="email" autocomplete="username"></div>
    <div class="field"><label data-i18n="password">Mật khẩu / Password</label><input id="login-pass" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" onclick="doLogin()" data-i18n="loginBtn">Đăng nhập / Login</button>
    <p id="login-error" class="muted" style="color:var(--danger)"></p>
  </div>
  <div class="center">
    <button class="iconbtn" style="color:var(--muted);background:none" onclick="toggleLang()"><span id="login-lang-label">EN / VI</span></button>
  </div>
</div>

<!-- APP -->
<div id="view-app" class="hidden">
  <header class="topbar">
    <div class="title">HAIC Sample Handover<small id="user-meta"></small></div>
    <div class="topbar-actions">
      <div class="lang-toggle">
        <button id="btn-lang-vi" onclick="setLang('vi')">VI</button>
        <button id="btn-lang-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="iconbtn" onclick="toggleDark()">🌓</button>
      <button class="iconbtn" onclick="doLogout()" data-i18n="logout">Đăng xuất</button>
    </div>
  </header>
  <nav class="tabs" id="tabs">
    <button data-tab="dashboard" class="active" data-i18n="tabDashboard">Tổng quan</button>
    <button data-tab="projects" data-i18n="tabProjects">Dự án</button>
    <button data-tab="forms" data-i18n="tabForms">Phiếu giao nhận</button>
    <button data-tab="goods" data-i18n="tabGoods">Giao nhận hàng</button>
    <button data-tab="admin" id="tab-admin-btn" data-i18n="tabAdmin">Quản trị</button>
  </nav>
  <main>
    <div id="tab-dashboard"></div>
    <div id="tab-projects" class="hidden"></div>
    <div id="tab-forms" class="hidden"></div>
    <div id="tab-goods" class="hidden"></div>
    <div id="tab-admin" class="hidden"></div>
  </main>
</div>

let LANG = localStorage.getItem('shp_lang') || 'vi';
function t(key){ return (I18N[key] && I18N[key][LANG]) || key; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i18n')); });
  document.getElementById('btn-lang-vi').classList.toggle('active', LANG==='vi');
  document.getElementById('btn-lang-en').classList.toggle('active', LANG==='en');
  document.getElementById('login-lang-label').textContent = LANG==='vi' ? 'VI / EN' : 'EN / VI';
  renderActiveTab();
}
function setLang(l){ LANG=l; localStorage.setItem('shp_lang', l); applyI18n(); }
function toggleLang(){ setLang(LANG==='vi'?'en':'vi'); }
function cName(code){ return COUNTRIES[code] ? COUNTRIES[code][LANG] : code; }

// ---------- Dark mode ----------
function toggleDark(){ document.body.classList.toggle('dark'); localStorage.setItem('shp_dark', document.body.classList.contains('dark')?'1':'0'); }
if(localStorage.getItem('shp_dark')==='1') document.body.classList.add('dark');

// ---------- Toast ----------
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), 2400); }

// ---------- State ----------
let CURRENT_USER = null; // {email, role, country, displayName}
let ACTIVE_TAB = 'dashboard';
let PROJECTS_CACHE = [];
let COMPANY_NAMES = {}; // country -> partyB name, loaded from settings/companyNames

// ---------- Auth ----------
function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';
  if(!email || !pass){ document.getElementById('login-error').textContent = t('invalidLogin'); return; }
  auth.signInWithEmailAndPassword(email, pass).catch(err=>{
    document.getElementById('login-error').textContent = t('invalidLogin') + ' (' + err.code + ')';
  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(async (user)=>{
  try{
    if(!user){
      CURRENT_USER = null;
      document.getElementById('view-app').classList.add('hidden');
      document.getElementById('view-login').classList.remove('hidden');
      applyI18n();
      return;
    }
    const email = user.email.toLowerCase();
    const userRef = db.collection('users').doc(email);
    let snap = await userRef.get();
    if(!snap.exists){
      if(email === SUPER_ADMIN_EMAIL){
        await userRef.set({ email, role:'superadmin', country:'KH', displayName:'Super Admin', active:true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        snap = await userRef.get();
      } else {
        toast(t('permissionDenied'));
        await auth.signOut();
        return;
      }
    }
    const data = snap.data();
    if(data.active === false){ toast(t('permissionDenied')); await auth.signOut(); return; }
    CURRENT_USER = { email, role:data.role, country:data.country, displayName:data.displayName || email };
    document.getElementById('view-login').classList.add('hidden');
    document.getElementById('view-app').classList.remove('hidden');
    document.getElementById('user-meta').textContent = `${CURRENT_USER.displayName} · ${CURRENT_USER.role} · ${CURRENT_USER.country}`;
    document.getElementById('tab-admin-btn').classList.toggle('hidden', CURRENT_USER.role==='user');
    await loadCompanyNames();
    await loadProjects();
    applyI18n();
  }catch(err){
    console.error('Auth/load error:', err);
    document.getElementById('view-app').classList.add('hidden');
    document.getElementById('view-login').classList.remove('hidden');
    document.getElementById('login-error').textContent = 'Lỗi / Error: ' + err.message;
    applyI18n();
  }
});

async function loadCompanyNames(){
  const docRef = db.collection('settings').doc('companyNames');
  const snap = await docRef.get();
  if(snap.exists){ COMPANY_NAMES = snap.data(); }
  else {
    COMPANY_NAMES = { VN: COUNTRIES.VN.defaultPartyB, LA: COUNTRIES.LA.defaultPartyB, KH: COUNTRIES.KH.defaultPartyB };
    if(CURRENT_USER && CURRENT_USER.role==='superadmin') docRef.set(COMPANY_NAMES);
  }
}

async function loadProjects(){
  let q = db.collection('projects');
  if(CURRENT_USER.role !== 'superadmin') q = q.where('country','==',CURRENT_USER.country);
  const snap = await q.get();
  PROJECTS_CACHE = snap.docs.map(d=>({id:d.id, ...d.data()}));
}

// ---------- Tabs ----------
document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-tab]');
  if(!btn) return;
  if(btn.classList.contains('hidden')) return;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ACTIVE_TAB = btn.dataset.tab;
  document.querySelectorAll('main > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById('tab-'+ACTIVE_TAB).classList.remove('hidden');
  renderActiveTab();
});
function renderActiveTab(){
  if(!CURRENT_USER) return;
  if(ACTIVE_TAB==='dashboard') renderDashboard();
  if(ACTIVE_TAB==='projects') renderProjects();
  if(ACTIVE_TAB==='forms') renderForms();
  if(ACTIVE_TAB==='goods') renderGoods();
  if(ACTIVE_TAB==='admin') renderAdmin();
}

// ---------- Modal helper ----------

  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="if(event.target===this) closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

// ============ PROJECTS ============
function renderProjects(){
  const el = document.getElementById('tab-projects');
  const countryOptions = Object.keys(COUNTRIES).map(c=>`<option value="${c}">${cName(c)}</option>`).join('');
  el.innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <h3 style="margin:0">${t('tabProjects')}</h3>
        <button class="btn small" onclick="openNewProjectModal()">${t('newProject')}</button>
      </div>
      ${CURRENT_USER.role==='superadmin' ? `<div class="field" style="max-width:220px"><label>${t('filterCountry')}</label>
      <select id="proj-filter" onchange="renderProjects()"><option value="ALL">${t('all')}</option>${countryOptions}</select></div>` : ''}
      <div id="projects-list">${t('loadingForms')}</div>
    </div>`;
  if(CURRENT_USER.role==='superadmin'){
    const sel = document.getElementById('proj-filter');
    if(sel) sel.value = window._projFilter || 'ALL';
  }
  loadProjects().then(()=>{
    let list = PROJECTS_CACHE;
    const filter = document.getElementById('proj-filter');
    if(filter){ window._projFilter = filter.value; if(filter.value!=='ALL') list = list.filter(p=>p.country===filter.value); }
    const listEl = document.getElementById('projects-list');
    if(!list.length){ listEl.innerHTML = `<p class="muted">${t('noProjects')}</p>`; return; }
    listEl.innerHTML = list.map(p=>`
      <div class="listrow">
        <div>
          <div><strong>${p.name}</strong> <span class="badge ${p.country}">${p.country}</span></div>
          <div class="meta">${p.location||''} ${p.code? '· '+p.code : ''}</div>
        </div>
        ${(CURRENT_USER.role!=='user') ? `<div><button class="btn small secondary" onclick="deleteProject('${p.id}')">${t('delete')}</button></div>` : ''}
      </div>`).join('');
  });
}
function openNewProjectModal(){
  const isSuper = CURRENT_USER.role==='superadmin';
  const countryOptions = Object.keys(COUNTRIES).map(c=>`<option value="${c}" ${c===CURRENT_USER.country?'selected':''}>${cName(c)}</option>`).join('');
  openModal(`
    <h3>${t('newProjectTitle')}</h3>
    <div class="field"><label>${t('projectName')}</label><input id="np-name"></div>
    <div class="field"><label>${t('projectCode')}</label><input id="np-code"></div>
    <div class="field"><label>${t('location')}</label><input id="np-location"></div>
    <div class="field"><label>${t('country')}</label>
      <select id="np-country" ${isSuper?'':'disabled'}>${countryOptions}</select>
    </div>
    <div class="row">
      <button class="btn" onclick="saveNewProject()">${t('save')}</button>
      <button class="btn secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>`);
}
async function saveNewProject(){
  const name = document.getElementById('np-name').value.trim();
  const code = document.getElementById('np-code').value.trim();
  const location = document.getElementById('np-location').value.trim();
  const country = document.getElementById('np-country').value;
  if(!name){ toast('...'); return; }
  await db.collection('projects').add({ name, code, location, country, createdBy:CURRENT_USER.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  closeModal(); toast(t('save')+' ✓'); renderProjects();
}
async function deleteProject(id){
  if(!confirm(t('confirmDelete'))) return;
  await db.collection('projects').doc(id).delete();
  renderProjects();
}

// ============ HANDOVER FORMS ============
function renderForms(){
  const el = document.getElementById('tab-forms');
  const countryOptions = Object.keys(COUNTRIES).map(c=>`<option value="${c}">${cName(c)}</option>`).join('');
  el.innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <h3 style="margin:0">${t('tabForms')}</h3>
        <button class="btn small" onclick="openFormEditor(null)">${t('newForm')}</button>
      </div>
      ${CURRENT_USER.role==='superadmin' ? `<div class="field" style="max-width:220px"><label>${t('filterCountry')}</label>
      <select id="form-filter" onchange="renderForms()"><option value="ALL">${t('all')}</option>${countryOptions}</select></div>` : ''}
      <div id="forms-list">${t('loadingForms')}</div>
    </div>`;
  let q = db.collection('handovers').orderBy('createdAt','desc');
  if(CURRENT_USER.role!=='superadmin') q = q.where('country','==',CURRENT_USER.country);
  q.get().then(snap=>{
    let list = snap.docs.map(d=>({id:d.id, ...d.data()}));
    const filter = document.getElementById('form-filter');
    if(filter && filter.value!=='ALL') list = list.filter(f=>f.country===filter.value);
    const listEl = document.getElementById('forms-list');
    if(!list.length){ listEl.innerHTML = `<p class="muted">${t('noForms')}</p>`; return; }
    listEl.innerHTML = list.map(f=>`
      <div class="listrow" onclick="openFormEditor('${f.id}')">
        <div>
          <div><strong>${f.docNo}</strong> <span class="badge ${f.country}">${f.country}</span></div>
          <div class="meta">${f.projectName||''} · ${f.date||''}</div>
        </div>
        <div class="meta">${t(f.status==='completed'?'completed':'draft')}</div>
      </div>`).join('');
  }).catch(err=>{
    document.getElementById('forms-list').innerHTML = `<p class="muted">${err.message}</p>`;
  });
}

function blankRow(no){ return {no, borehole:'', depth:'', soil:0, rock:0, spt:0, water:0, stainless:0, pvc:0, remarks:''}; }

async function openFormEditor(formId){
  let form;
  if(formId){
    const snap = await db.collection('handovers').doc(formId).get();
    form = {id:formId, ...snap.data()};
  } else {
    form = {
      country: CURRENT_USER.country, projectId:'', projectName:'', location:'',
      partyA_name:'', partyA_person:'', partyB_name: COMPANY_NAMES[CURRENT_USER.country] || '', partyB_person:'',
      place:'', date: new Date().toISOString().slice(0,10),
      rows:[blankRow(1)], comment:'', signPartyA:'', signPartyB:'', status:'draft'
    };
  }
  window._editingForm = form;
  renderFormEditorView();
}

function changeFormCountry(){
  const c = document.getElementById('f-country').value;
  window._editingForm.country = c;
  window._editingForm.projectId = '';
  window._editingForm.partyB_name = COMPANY_NAMES[c] || '';
  renderFormEditorView();
}
function onProjectChange(){
  const id = document.getElementById('f-project').value;
  const p = PROJECTS_CACHE.find(p=>p.id===id);
  window._editingForm.projectId = id;
  window._editingForm.projectName = p ? p.name : '';
  if(p){ document.getElementById('f-location').value = p.location || ''; }
}
function renderRows(){
  const tbody = document.getElementById('rows-tbody');
  const rows = window._editingForm.rows;
  tbody.innerHTML = rows.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="txt"><input value="${r.borehole}" onchange="updateRow(${i},'borehole',this.value)"></td>
      <td><input value="${r.depth}" onchange="updateRow(${i},'depth',this.value)" style="width:55px"></td>
      <td><input type="number" min="0" value="${r.soil}" onchange="updateRow(${i},'soil',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.rock}" onchange="updateRow(${i},'rock',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.spt}" onchange="updateRow(${i},'spt',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.water}" onchange="updateRow(${i},'water',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.stainless}" onchange="updateRow(${i},'stainless',this.value)" style="width:45px"></td>
      <td><input type="number" min="0" value="${r.pvc}" onchange="updateRow(${i},'pvc',this.value)" style="width:45px"></td>
      <td class="txt"><input value="${r.remarks}" onchange="updateRow(${i},'remarks',this.value)"></td>
      <td><button class="btn small secondary" onclick="removeRow(${i})">✕</button></td>
    </tr>`).join('') + totalsRowHtml(rows);
}
function totalsRowHtml(rows){
  const sum = k => rows.reduce((a,r)=>a + (parseFloat(r[k])||0), 0);
  return `<tr class="totalrow"><td colspan="3">${t('total')}</td>
    <td>${sum('soil')}</td><td>${sum('rock')}</td><td>${sum('spt')}</td><td>${sum('water')}</td>
    <td>${sum('stainless')}</td><td>${sum('pvc')}</td><td colspan="2"></td></tr>`;
}
function updateRow(i, field, val){
  window._editingForm.rows[i][field] = (['soil','rock','spt','water','stainless','pvc'].includes(field)) ? (parseFloat(val)||0) : val;
  renderRows();
}
function addRow(){ window._editingForm.rows.push(blankRow(window._editingForm.rows.length+1)); renderRows(); }
function removeRow(i){ window._editingForm.rows.splice(i,1); renderRows(); }

async function getNextDocNo(country){
  const counterRef = db.collection('counters').doc(country);
  return db.runTransaction(async (tx)=>{
    const snap = await tx.get(counterRef);
    const last = snap.exists ? (snap.data().lastNumber||0) : 0;
    const next = last + 1;
    tx.set(counterRef, {lastNumber: next}, {merge:true});
    return `${country}-${String(next).padStart(4,'0')}`;
  });
}

async function saveForm(status){
  const form = window._editingForm;
  form.location = document.getElementById('f-location').value.trim();
  form.partyA_name = document.getElementById('f-partyA-name').value.trim();
  form.partyA_person = document.getElementById('f-partyA-person').value.trim();
  form.partyB_name = document.getElementById('f-partyB-name').value.trim();
  form.partyB_person = document.getElementById('f-partyB-person').value.trim();
  form.place = document.getElementById('f-place').value.trim();
  form.date = document.getElementById('f-date').value;
  form.comment = document.getElementById('f-comment').value;
  form.status = status;
  if(!form.projectId){ toast(t('selectProjectFirst')); return; }

  const payload = {
    country: form.country, projectId: form.projectId, projectName: form.projectName, location: form.location,
    partyA_name: form.partyA_name, partyA_person: form.partyA_person,
    partyB_name: form.partyB_name, partyB_person: form.partyB_person,
    place: form.place, date: form.date, rows: form.rows, comment: form.comment, status: form.status,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: CURRENT_USER.email
  };

  if(form.id){
    await db.collection('handovers').doc(form.id).update(payload);
    toast(t('formSaved'));
  } else {
    const docNo = await getNextDocNo(form.country);
    payload.docNo = docNo;
    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    payload.createdBy = CURRENT_USER.email;
    const ref = await db.collection('handovers').add(payload);
    form.id = ref.id; form.docNo = docNo;
    toast(t('formSaved') + ': ' + docNo);
  }
  renderFormEditorView();
}
async function deleteForm(){
  if(!confirm(t('confirmDelete'))) return;
  await db.collection('handovers').doc(window._editingForm.id).delete();
  renderForms();
}

function exportPdf(){
  const f = window._editingForm;
  const doc = new jspdf.jsPDF();
  doc.setFontSize(13); doc.text(t('formTitle'), 105, 14, {align:'center'});
  doc.setFontSize(9);
  doc.text(`${t('docNo')}: ${f.docNo||''}`, 14, 22);
  doc.text(`${t('project')}: ${f.projectName||''}`, 14, 28);
  doc.text(`${t('location')}: ${f.location||''}`, 14, 34);
  doc.text(`${t('partyA')}: ${f.partyA_name||''} (${f.partyA_person||''})`, 14, 40);
  doc.text(`${t('partyB')}: ${f.partyB_name||''} (${f.partyB_person||''})`, 14, 46);
  const sum = k => f.rows.reduce((a,r)=>a + (parseFloat(r[k])||0), 0);
  const body = f.rows.map((r,i)=>[i+1, r.borehole, r.depth, r.soil, r.rock, r.spt, r.water, r.stainless, r.pvc, r.remarks]);
  body.push([t('total'),'','',sum('soil'),sum('rock'),sum('spt'),sum('water'),sum('stainless'),sum('pvc'),'']);
  doc.autoTable({
    startY:52,
    head:[[t('no'),t('borehole'),t('depth'),t('soil'),t('rock'),t('spt'),t('water'),t('stainless'),t('pvc'),t('remarks')]],
    body, styles:{fontSize:7}
  });
  let y = doc.lastAutoTable.finalY + 8;
  doc.text(`${t('comment')}: ${f.comment||''}`, 14, y); y+=14;
  doc.text(t('signPartyA'), 40, y, {align:'center'});
  doc.text(t('signPartyB'), 160, y, {align:'center'});
  doc.save(`${f.docNo||'handover'}.pdf`);
}
function exportExcel(){
  const f = window._editingForm;
  const sum = k => f.rows.reduce((a,r)=>a + (parseFloat(r[k])||0), 0);
  const sheetData = [
    [t('formTitle')],
    [t('docNo'), f.docNo||''],
    [t('project'), f.projectName||''],
    [t('location'), f.location||''],
    [t('partyA'), f.partyA_name||'', f.partyA_person||''],
    [t('partyB'), f.partyB_name||'', f.partyB_person||''],
    [],
    [t('no'),t('borehole'),t('depth'),t('soil'),t('rock'),t('spt'),t('water'),t('stainless'),t('pvc'),t('remarks')],
    ...f.rows.map((r,i)=>[i+1, r.borehole, r.depth, r.soil, r.rock, r.spt, r.water, r.stainless, r.pvc, r.remarks]),
    [t('total'),'','',sum('soil'),sum('rock'),sum('spt'),sum('water'),sum('stainless'),sum('pvc'),''],
    [],
    [t('comment'), f.comment||'']
  ];
  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Handover');
  XLSX.writeFile(wb, `${f.docNo||'handover'}.xlsx`);
}

function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
function roleLabel(r){ if(r==='superadmin') return t('roleSuperadmin'); if(r==='admin') return t('roleAdmin'); return t('roleUser'); }

async function changeUserRole(email, newRole, selectEl){
  // Ngăn admin tự tạo superadmin nếu không phải superadmin
  if(newRole==='superadmin' && CURRENT_USER.role!=='superadmin'){
    toast(t('permissionDenied')); selectEl.value = selectEl.dataset.prev || 'user'; return;
  }
  if(!confirm(`Đổi vai trò → ${roleLabel(newRole)}?`)){ 
    selectEl.value = selectEl.dataset.prev || selectEl.value; return; 
  }
  try{
    await db.collection('users').doc(email).update({ role: newRole });
    toast(`✓ ${roleLabel(newRole)}`);
    renderAdmin();
  }catch(err){
    toast(err.message);
    renderAdmin();
  }
}

function openNewUserModal(){
  const isSuper = CURRENT_USER.role==='superadmin';
  const countryOptions = Object.keys(COUNTRIES).map(c=>`<option value="${c}" ${c===CURRENT_USER.country?'selected':''}>${cName(c)}</option>`).join('');
  const roleOptions = `<option value="user">${t('roleUser')}</option>` + (isSuper ? `<option value="admin">${t('roleAdmin')}</option><option value="superadmin">${t('roleSuperadmin')}</option>` : '');
  openModal(`
    <h3>${t('newAccount')}</h3>
    <div class="field"><label>${t('staffName')}</label><input id="nu-name"></div>
    <div class="field"><label>${t('email')}</label><input id="nu-email" type="email"></div>
    <div class="field"><label>${t('password6')}</label><input id="nu-pass" type="password"></div>
    <p class="muted">${t('tempPasswordNote')}</p>
    <div class="field"><label>${t('role')}</label><select id="nu-role" class="role-select">${roleOptions}</select></div>
    <div class="field"><label>${t('country')}</label><select id="nu-country" ${isSuper?'':'disabled'}>${countryOptions}</select></div>
    <div class="row">
      <button class="btn" onclick="saveNewUser()">${t('save')}</button>
      <button class="btn secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>`);
}
async function saveNewUser(){
  const name = document.getElementById('nu-name').value.trim();
  const email = document.getElementById('nu-email').value.trim().toLowerCase();
  const pass = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;
  const country = document.getElementById('nu-country').value;
  if(!email || pass.length<6){ toast(t('password6')); return; }
  // Secondary app instance so we don't sign out the current admin
  const secondary = firebase.initializeApp(firebaseConfig, 'Secondary-' + Date.now());
  try{
    await secondary.auth().createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(email).set({
      email, displayName:name, role, country, active:true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdBy: CURRENT_USER.email
    });
    await secondary.auth().signOut();
    await secondary.delete();
    closeModal(); toast(t('save')+' ✓'); renderAdmin();
  }catch(err){
    toast(err.message);
    await secondary.delete();
  }
}
async function toggleUserActive(email, makeActive){
  await db.collection('users').doc(email).update({active: makeActive});
  renderAdmin();
}
async function saveCompanyNames(){
  const data = {};
  Object.keys(COUNTRIES).forEach(c=>{ data[c] = document.getElementById('cn-'+c).value.trim(); });
  await db.collection('settings').doc('companyNames').set(data);
  COMPANY_NAMES = data;
  toast(t('save')+' ✓');
}


// ============================================================
// GOODS HANDOVER MODULE
// ============================================================
let GOODS_VIEW = 'all'; // 'all' | 'sent' | 'inbox'

function gStatus(s){
  if(s==='transit') return t('statusTransit');
  if(s==='delivered') return t('statusDelivered');
  return t('statusPending');
}
function gStatusColor(s){
  if(s==='transit') return 'var(--warn)';
  if(s==='delivered') return 'var(--accent)';
  return 'var(--muted)';
}

function renderGoods(){
  const el = document.getElementById('tab-goods');
  const countryOptions = Object.keys(COUNTRIES).map(c=>`<option value="${c}">${cName(c)}</option>`).join('');
  el.innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h3 style="margin:0">${t('tabGoods')}</h3>
        <button class="btn small" onclick="openGoodsEditor(null)">${t('newGoodsForm')}</button>
      </div>
      <div class="row" style="margin-top:10px;gap:6px">
        <button class="btn small ${GOODS_VIEW==='all'?'':'secondary'}" onclick="setGoodsView('all')">${t('allGoods')}</button>
        <button class="btn small ${GOODS_VIEW==='sent'?'':'secondary'}" onclick="setGoodsView('sent')">${t('mySent')}</button>
        <button class="btn small ${GOODS_VIEW==='inbox'?'':'secondary'}" onclick="setGoodsView('inbox')">${t('myInbox')}</button>
        ${CURRENT_USER.role==='superadmin' ? `<div class="field" style="max-width:180px;margin:0"><select id="goods-filter" onchange="renderGoods()"><option value="ALL">${t('all')}</option>${countryOptions}</select></div>` : ''}
      </div>
      <div id="goods-list" style="margin-top:10px">${t('loadingForms')}</div>
    </div>`;
  loadGoodsList();
}
function setGoodsView(v){ GOODS_VIEW=v; renderGoods(); }

async function loadGoodsList(){
  const listEl = document.getElementById('goods-list');
  if(!listEl) return;
  try{
    let snap;
    if(GOODS_VIEW==='sent'){
      snap = await db.collection('goods_handovers').where('createdBy','==',CURRENT_USER.email).orderBy('createdAt','desc').get();
    } else if(GOODS_VIEW==='inbox'){
      snap = await db.collection('goods_handovers').where('receiverEmail','==',CURRENT_USER.email).orderBy('createdAt','desc').get();
    } else {
      let q = db.collection('goods_handovers').orderBy('createdAt','desc');
      if(CURRENT_USER.role!=='superadmin') q = q.where('senderCountry','==',CURRENT_USER.country);
      const filter = document.getElementById('goods-filter');
      if(filter && filter.value!=='ALL') q = q.where('senderCountry','==',filter.value);
      snap = await q.get();
    }
    let list = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!list.length){ listEl.innerHTML=`<p class="muted">${t('noGoods')}</p>`; return; }
    listEl.innerHTML = list.map(g=>`
      <div class="listrow" onclick="openGoodsEditor('${g.id}')">
        <div>
          <div><strong>${g.docNo||'...'}</strong>
            <span class="badge ${g.senderCountry}">${g.senderCountry}</span>
            <span style="font-size:11px;color:var(--muted)">→</span>
            <span class="badge ${g.receiverCountry}">${g.receiverCountry}</span>
          </div>
          <div class="meta">${g.senderName||''} → ${g.receiverName||''} · ${g.sendDate||''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:700;color:${gStatusColor(g.status)}">${gStatus(g.status)}</div>
          ${g.status!=='delivered' && g.receiverEmail===CURRENT_USER.email
            ? `<button class="btn small" style="margin-top:4px;background:var(--accent)" onclick="event.stopPropagation();openConfirmReceive('${g.id}')">${t('confirmReceive')}</button>` : ''}
        </div>
      </div>`).join('');
  }catch(err){
    listEl.innerHTML=`<p class="muted">${err.message}</p>`;
  }
}

function blankGoodsRow(){ return {name:'',qty:'',unit:'',condition:'',remarks:''}; }

async function openGoodsEditor(formId){
  let g;
  if(formId){
    const snap = await db.collection('goods_handovers').doc(formId).get();
    g = {id:formId,...snap.data()};
  } else {
    g = {
      senderCountry:CURRENT_USER.country, senderName:CURRENT_USER.displayName,
      senderEmail:CURRENT_USER.email, senderPhone:'',
      receiverCountry:'', receiverName:'', receiverEmail:'', receiverPhone:'',
      carrierName:'', carrierPhone:'', trackingNo:'',
      sendDate:new Date().toISOString().slice(0,10), estimatedArrival:'',
      items:[blankGoodsRow()], comment:'', status:'pending'
    };
  }
  window._editingGoods = g;
  renderGoodsEditorView();
}

function renderGoodsEditorView(){
  const g = window._editingGoods;
  const isSuper = CURRENT_USER.role==='superadmin';
  const cOpts = Object.keys(COUNTRIES).map(c=>`<option value="${c}" ${c===g.senderCountry?'selected':''}>${cName(c)}</option>`).join('');
  const rOpts = Object.keys(COUNTRIES).map(c=>`<option value="${c}" ${c===g.receiverCountry?'selected':''}>${cName(c)}</option>`).join('');
  const isDelivered = g.status==='delivered';
  const canEdit = !isDelivered && (CURRENT_USER.email===g.createdBy || CURRENT_USER.role!=='user' || !g.id);
  const dis = isDelivered ? 'disabled' : '';

  document.getElementById('tab-goods').innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <h3 style="margin:0">${t('goodsFormTitle')} ${g.docNo?'· '+g.docNo:''}</h3>
        <button class="btn small secondary" onclick="renderGoods()">← ${t('close')}</button>
      </div>
      ${isDelivered ? `<div style="background:var(--accent);color:#fff;border-radius:8px;padding:8px 12px;margin:8px 0;font-weight:700">✓ ${t('statusDelivered')} — ${g.confirmedBy||''} · ${g.actualReceiveDate||''}</div>` : ''}

      <div class="section-title">${t('sender')}</div>
      <div class="row">
        <div class="field"><label>${t('senderCountry')}</label>
          <select id="g-scountry" ${isSuper&&!g.id?'':'disabled'}>${cOpts}</select></div>
        <div class="field"><label>${t('senderName')}</label><input id="g-sname" value="${g.senderName||''}" ${dis}></div>
        <div class="field"><label>${t('senderPhone')}</label><input id="g-sphone" value="${g.senderPhone||''}" ${dis}></div>
      </div>

      <div class="section-title">${t('receiver')}</div>
      <div class="row">
        <div class="field"><label>${t('receiverCountry')}</label>
          <select id="g-rcountry" ${dis}>${rOpts}</select></div>
        <div class="field"><label>${t('receiverName')}</label><input id="g-rname" value="${g.receiverName||''}" ${dis}></div>
        <div class="field"><label>${t('receiverPhone')}</label><input id="g-rphone" value="${g.receiverPhone||''}" ${dis}></div>
      </div>
      <div class="row">
        <div class="field"><label>${t('receiverAccount')}</label>
          <input id="g-remail" type="email" value="${g.receiverEmail||''}" placeholder="email@haic.com" ${dis}></div>
      </div>

      <div class="section-title">${t('carrier')}</div>
      <div class="row">
        <div class="field"><label>${t('carrierName')}</label><input id="g-cname" value="${g.carrierName||''}" ${dis}></div>
        <div class="field"><label>${t('carrierPhone')}</label><input id="g-cphone" value="${g.carrierPhone||''}" ${dis}></div>
        <div class="field"><label>${t('trackingNo')}</label><input id="g-track" value="${g.trackingNo||''}" ${dis}></div>
      </div>
      <div class="row">
        <div class="field"><label>${t('sendDate')}</label><input id="g-sdate" type="date" value="${g.sendDate||''}" ${dis}></div>
        <div class="field"><label>${t('estimatedArrival')}</label><input id="g-eta" type="date" value="${g.estimatedArrival||''}" ${dis}></div>
      </div>

      <div class="section-title">${t('tabGoods')}</div>
      <div class="tablewrap">
        <table class="grid" id="goods-rows-table">
          <thead><tr>
            <th>${t('no')}</th>
            <th style="min-width:160px">${t('itemName')}</th>
            <th style="min-width:60px">${t('qty')}</th>
            <th style="min-width:70px">${t('unit')}</th>
            <th style="min-width:100px">${t('condition')}</th>
            <th style="min-width:120px">${t('remarks')}</th>
            ${!isDelivered?'<th></th>':''}
          </tr></thead>
          <tbody id="goods-rows-tbody"></tbody>
        </table>
      </div>
      ${!isDelivered ? `<button class="btn small secondary" style="margin-top:8px" onclick="addGoodsRow()">${t('addRow')}</button>` : ''}

      <div class="section-title">${t('comment')}</div>
      <textarea id="g-comment" ${dis}>${g.comment||''}</textarea>

      ${!isDelivered ? `
      <div class="row" style="margin-top:14px;flex-wrap:wrap">
        ${canEdit ? `
        <button class="btn" onclick="saveGoodsForm('pending')">${t('save')} (${t('statusPending')})</button>
        <button class="btn" style="background:var(--warn)" onclick="saveGoodsForm('transit')">${t('markTransit')}</button>` : ''}
        ${g.id && g.receiverEmail===CURRENT_USER.email && g.status!=='delivered'
          ? `<button class="btn" style="background:var(--accent)" onclick="openConfirmReceive('${g.id}')">${t('confirmReceive')}</button>` : ''}
        ${g.id ? `
        <button class="btn secondary" onclick="exportGoodsPdf()">${t('exportPdf')}</button>
        <button class="btn secondary" onclick="exportGoodsExcel()">${t('exportExcel')}</button>
        ${CURRENT_USER.role!=='user' ? `<button class="btn danger" onclick="deleteGoodsForm()">${t('delete')}</button>` : ''}` : ''}
      </div>` : `
      <div class="row" style="margin-top:14px">
        <button class="btn secondary" onclick="exportGoodsPdf()">${t('exportPdf')}</button>
        <button class="btn secondary" onclick="exportGoodsExcel()">${t('exportExcel')}</button>
      </div>`}
    </div>`;
  renderGoodsRows();
}

function renderGoodsRows(){
  const g = window._editingGoods;
  const isDelivered = g.status==='delivered';
  const tbody = document.getElementById('goods-rows-tbody');
  if(!tbody) return;
  tbody.innerHTML = g.items.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="txt"><input value="${r.name}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'name',this.value)"></td>
      <td><input type="number" min="0" value="${r.qty}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'qty',this.value)" style="width:55px"></td>
      <td class="txt"><input value="${r.unit}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'unit',this.value)" style="width:60px"></td>
      <td class="txt"><input value="${r.condition}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'condition',this.value)"></td>
      <td class="txt"><input value="${r.remarks}" ${isDelivered?'disabled':''} onchange="updateGoodsRow(${i},'remarks',this.value)"></td>
      ${!isDelivered ? `<td><button class="btn small secondary" onclick="removeGoodsRow(${i})">✕</button></td>` : ''}
    </tr>`).join('');
}
function updateGoodsRow(i,f,v){ window._editingGoods.items[i][f]=v; }
function addGoodsRow(){ window._editingGoods.items.push(blankGoodsRow()); renderGoodsRows(); }
function removeGoodsRow(i){ window._editingGoods.items.splice(i,1); renderGoodsRows(); }

function collectGoodsFields(){
  const g = window._editingGoods;
  g.senderName = document.getElementById('g-sname').value.trim();
  g.senderPhone = document.getElementById('g-sphone').value.trim();
  g.receiverCountry = document.getElementById('g-rcountry').value;
  g.receiverName = document.getElementById('g-rname').value.trim();
  g.receiverPhone = document.getElementById('g-rphone').value.trim();
  g.receiverEmail = document.getElementById('g-remail').value.trim().toLowerCase();
  g.carrierName = document.getElementById('g-cname').value.trim();
  g.carrierPhone = document.getElementById('g-cphone').value.trim();
  g.trackingNo = document.getElementById('g-track').value.trim();
  g.sendDate = document.getElementById('g-sdate').value;
  g.estimatedArrival = document.getElementById('g-eta').value;
  g.comment = document.getElementById('g-comment').value;
}

async function getNextGoodsDocNo(country){
  const counterRef = db.collection('counters').doc(country+'-HH');
  return db.runTransaction(async(tx)=>{
    const snap = await tx.get(counterRef);
    const last = snap.exists ? (snap.data().lastNumber||0) : 0;
    const next = last+1;
    tx.set(counterRef,{lastNumber:next},{merge:true});
    return `${country}-HH-${String(next).padStart(4,'0')}`;
  });
}

async function saveGoodsForm(status){
  collectGoodsFields();
  const g = window._editingGoods;
  if(!g.receiverEmail){ toast(t('receiverAccount')+' ?'); return; }
  if(!g.receiverCountry){ toast(t('receiverCountry')+' ?'); return; }
  g.status = status;
  const payload = {
    senderCountry:g.senderCountry, senderName:g.senderName,
    senderEmail:g.senderEmail||CURRENT_USER.email, senderPhone:g.senderPhone,
    receiverCountry:g.receiverCountry, receiverName:g.receiverName,
    receiverEmail:g.receiverEmail, receiverPhone:g.receiverPhone,
    carrierName:g.carrierName, carrierPhone:g.carrierPhone, trackingNo:g.trackingNo,
    sendDate:g.sendDate, estimatedArrival:g.estimatedArrival,
    items:g.items, comment:g.comment, status:g.status,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(), updatedBy:CURRENT_USER.email
  };
  if(g.id){
    await db.collection('goods_handovers').doc(g.id).update(payload);
    toast(t('formSaved'));
  } else {
    const docNo = await getNextGoodsDocNo(g.senderCountry);
    payload.docNo = docNo;
    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    payload.createdBy = CURRENT_USER.email;
    const ref = await db.collection('goods_handovers').add(payload);
    g.id = ref.id; g.docNo = docNo;
    toast(t('formSaved')+': '+docNo);
  }
  renderGoodsEditorView();
}

async function deleteGoodsForm(){
  if(!confirm(t('confirmDelete'))) return;
  await db.collection('goods_handovers').doc(window._editingGoods.id).delete();
  renderGoods();
}

function openConfirmReceive(formId){
  openModal(`
    <h3>${t('confirmReceiveTitle')}</h3>
    <div class="field"><label>${t('actualReceiveDate')}</label><input id="cr-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>${t('confirmNote')}</label><textarea id="cr-note" style="min-height:70px"></textarea></div>
    <div class="row">
      <button class="btn" style="background:var(--accent)" onclick="submitConfirmReceive('${formId}')">${t('confirmReceive')}</button>
      <button class="btn secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>`);
}
async function submitConfirmReceive(formId){
  const date = document.getElementById('cr-date').value;
  const note = document.getElementById('cr-note').value;
  await db.collection('goods_handovers').doc(formId).update({
    status:'delivered',
    actualReceiveDate:date,
    confirmNote:note,
    confirmedBy:CURRENT_USER.displayName,
    confirmedByEmail:CURRENT_USER.email,
    confirmedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  closeModal();
  toast('✓ '+t('statusDelivered'));
  // Refresh
  if(window._editingGoods && window._editingGoods.id===formId){
    openGoodsEditor(formId);
  } else {
    renderGoods();
  }
}

function exportGoodsPdf(){
  const g = window._editingGoods;
  const doc = new jspdf.jsPDF();
  doc.setFontSize(13); doc.text(t('goodsFormTitle'), 105, 14, {align:'center'});
  doc.setFontSize(9);
  let y=24;
  doc.text(`${t('goodsDocNo')}: ${g.docNo||''}`, 14, y); y+=6;
  doc.text(`${t('sender')}: ${g.senderName||''} (${g.senderCountry}) · ${g.senderPhone||''}`, 14, y); y+=6;
  doc.text(`${t('receiver')}: ${g.receiverName||''} (${g.receiverCountry}) · ${g.receiverPhone||''}`, 14, y); y+=6;
  doc.text(`${t('carrier')}: ${g.carrierName||''} · ${g.carrierPhone||''} · Tracking: ${g.trackingNo||''}`, 14, y); y+=6;
  doc.text(`${t('sendDate')}: ${g.sendDate||''} · ${t('estimatedArrival')}: ${g.estimatedArrival||''}`, 14, y); y+=8;
  doc.autoTable({
    startY:y,
    head:[[t('no'),t('itemName'),t('qty'),t('unit'),t('condition'),t('remarks')]],
    body:g.items.map((r,i)=>[i+1,r.name,r.qty,r.unit,r.condition,r.remarks]),
    styles:{fontSize:8}
  });
  y = doc.lastAutoTable.finalY + 8;
  doc.text(`${t('comment')}: ${g.comment||''}`, 14, y); y+=10;
  if(g.status==='delivered'){
    doc.text(`${t('statusDelivered')}: ${g.confirmedBy||''} · ${g.actualReceiveDate||''}`, 14, y); y+=6;
    doc.text(`${t('confirmNote')}: ${g.confirmNote||''}`, 14, y); y+=10;
  }
  doc.text(t('sender'), 50, y+30, {align:'center'});
  doc.text(t('receiver'), 160, y+30, {align:'center'});
  doc.save(`${g.docNo||'goods'}.pdf`);
}

function exportGoodsExcel(){
  const g = window._editingGoods;
  const sheetData = [
    [t('goodsFormTitle')],
    [t('goodsDocNo'), g.docNo||''],
    [t('sender'), g.senderName||'', g.senderCountry, g.senderPhone||''],
    [t('receiver'), g.receiverName||'', g.receiverCountry, g.receiverPhone||''],
    [t('carrier'), g.carrierName||'', g.carrierPhone||'', g.trackingNo||''],
    [t('sendDate'), g.sendDate||'', t('estimatedArrival'), g.estimatedArrival||''],
    [],
    [t('no'),t('itemName'),t('qty'),t('unit'),t('condition'),t('remarks')],
    ...g.items.map((r,i)=>[i+1,r.name,r.qty,r.unit,r.condition,r.remarks]),
    [],
    [t('comment'), g.comment||''],
    ...(g.status==='delivered'?[[t('statusDelivered'), g.confirmedBy||'', g.actualReceiveDate||'', g.confirmNote||'']]:[])
  ];
  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Goods');
  XLSX.writeFile(wb, `${g.docNo||'goods'}.xlsx`);
}
